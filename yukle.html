<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<title>DubFin — Veri Yükleme</title>
<style>
body{font-family:sans-serif;max-width:600px;margin:40px auto;padding:20px;}
button{background:#0F1E33;color:white;padding:12px 24px;border:none;border-radius:8px;cursor:pointer;font-size:16px;}
#log{margin-top:20px;padding:16px;background:#f5f5f5;border-radius:8px;height:300px;overflow-y:auto;font-size:13px;font-family:monospace;}
</style>
</head>
<body>
<h2>DubFin — Supabase Veri Yükleme</h2>
<p>Dify'daki sirkülerleri Supabase'e aktarmak için aşağıdaki alana sirküler verilerini yapıştırın.</p>

<textarea id="veri" style="width:100%;height:200px;margin:10px 0;padding:10px;font-size:12px;" 
  placeholder='[{"sirkuler_no":"2026/83","tarih":"13.06.2026","metin":"..."}]'></textarea>

<button onclick="yukle()">Yükle</button>
<button onclick="temizle()" style="margin-left:10px;background:#999;">Temizle</button>

<div id="log">Log burada görünecek...</div>

<script>
async function yukle() {
  const log = document.getElementById('log');
  const veri = document.getElementById('veri').value.trim();
  
  let sirkulerler;
  try {
    sirkulerler = JSON.parse(veri);
  } catch(e) {
    log.innerHTML = 'HATA: Geçersiz JSON formatı';
    return;
  }

  log.innerHTML = `${sirkulerler.length} sirküler yüklenecek...\n`;

  for (let i = 0; i < sirkulerler.length; i++) {
    const s = sirkulerler[i];
    try {
      const res = await fetch('/.netlify/functions/ingest', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          sirkuler_no: s.sirkuler_no,
          tarih: s.tarih,
          metin: s.metin
        })
      });
      const data = await res.json();
      if (data.basarili) {
        log.innerHTML += `✅ ${i+1}/${sirkulerler.length} — ${s.sirkuler_no}\n`;
      } else {
        log.innerHTML += `❌ ${i+1}/${sirkulerler.length} — ${s.sirkuler_no}: ${data.hata}\n`;
      }
    } catch(e) {
      log.innerHTML += `❌ ${i+1}/${sirkulerler.length} — ${s.sirkuler_no}: ${e.message}\n`;
    }
    log.scrollTop = log.scrollHeight;
    await new Promise(r => setTimeout(r, 500));
  }
  log.innerHTML += '\n✅ Yükleme tamamlandı!';
}

function temizle() {
  document.getElementById('veri').value = '';
  document.getElementById('log').innerHTML = 'Log burada görünecek...';
}
</script>
</body>
</html>
