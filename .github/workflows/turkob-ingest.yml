name: TÜRMOB Sirküler Otomatik İngestion

on:
  schedule:
    # Her gün 04:00 UTC = 07:00 TR saati
    - cron: '0 4 * * *'
  workflow_dispatch:
    # Elle de tetiklenebilir (test için)

jobs:
  ingest:
    runs-on: ubuntu-latest
    
    steps:
      - name: Repo'yu çek
        uses: actions/checkout@v4

      - name: Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Bağımlılıkları yükle
        run: |
          cd scripts
          npm install

      - name: Sirkülerleri çek ve yükle
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SCRAPERAPI_KEY: ${{ secrets.SCRAPERAPI_KEY }}
          PDFCO_API_KEY: ${{ secrets.PDFCO_API_KEY }}
        run: |
          cd scripts
          node ingest.js
